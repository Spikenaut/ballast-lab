[package]
name = "limbic-critic"
version = "0.2.0"
edition = "2021"
description = "Neuromodulatory reward shaping and RL critic functions for SNNs."
repository = "https://github.com/Limen-Neural/limbic-critic"

[dependencies]
neuromod = { git = "https://github.com/Limen-Neural/neuromod" }
serde = { version = "1.0", features = ["derive"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
